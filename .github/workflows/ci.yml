name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  backend:
    name: Backend — lint & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      # Run every Python version even if one fails, so the full matrix result is visible.
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        # Install from pyproject so it stays the single source of truth.
        # asyncpg/aiokafka ship manylinux wheels for cp311–cp313, so no build step.
        run: pip install -e ".[test,dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        env:
          # Force SQLite so the suite never reaches for a real Postgres.
          COMMONS_DATABASE_URL: "sqlite+aiosqlite://"
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage
        # One representative report (3.12) — artifact names must be unique per run.
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7
