version: '3.8'

services:
  # Infrastructure
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: floorsense
      POSTGRES_PASSWORD: floorsense
      POSTGRES_DB: floorsense
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8080:8080"

  # Application services (add these as you build them)
  # location:
  #   build: ../services/location
  #   ports:
  #     - "8001:8001"
  #   depends_on:
  #     - postgres
  #     - redis
  #     - redpanda

  # analytics:
  #   build: ../services/analytics
  #   ports:
  #     - "8002:8002"
