<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lockupFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3FE8D2"/>
      <stop offset="100%" stop-color="#1B8C82"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&amp;family=Spline+Sans+Mono:wght@500&amp;display=swap');
      .cw-name{ font-family:'Unbounded', sans-serif; font-weight:800; font-size:30px; fill:#0F1A20; letter-spacing:-0.01em; }
      .cw-tag{ font-family:'Spline Sans Mono', monospace; font-weight:500; font-size:10px; fill:#728C94; letter-spacing:0.16em; text-transform:uppercase; }
    </style>
  </defs>

  <!-- mark, scaled down -->
  <g transform="translate(8,8) scale(0.5)">
    <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#lockupFill)"/>
    <g opacity="0.95">
      <rect x="18" y="28" width="31" height="72" rx="4" fill="#04201E" fill-opacity="0.18"/>
      <rect x="49" y="24" width="30" height="80" rx="4" fill="#04201E" fill-opacity="0.06"/>
      <rect x="79" y="28" width="31" height="72" rx="4" fill="#04201E" fill-opacity="0.24"/>
    </g>
    <line x1="49.5" y1="24" x2="49.5" y2="104" stroke="#04201E" stroke-opacity="0.42" stroke-width="3.5"/>
    <line x1="78.5" y1="24" x2="78.5" y2="104" stroke="#04201E" stroke-opacity="0.42" stroke-width="3.5"/>
    <path d="M22 80 C34 66, 40 90, 50 74 S66 48, 79 62 S98 82, 106 56" fill="none" stroke="#04201E" stroke-opacity="0.6" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22 58 C36 50, 46 62, 58 54 S78 42, 106 48" fill="none" stroke="#04201E" stroke-opacity="0.28" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(64,70)">
      <path d="M0,-15 C8,-15 14,-9 14,-2 C14,7 0,19 0,19 C0,19 -14,7 -14,-2 C-14,-9 -8,-15 0,-15 Z" fill="#04201E"/>
      <circle r="4.6" cy="-2" fill="url(#lockupFill)"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="78" y="40" class="cw-name">Commons</text>
  <text x="79" y="58" class="cw-tag">Network Mapping</text>
