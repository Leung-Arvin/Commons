<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <rect width="1000" height="600" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <!-- Outer walls -->
  <rect x="10" y="10" width="980" height="580" fill="none" stroke="#333" stroke-width="3"/>
  <!-- Conference room -->
  <rect x="50" y="50" width="250" height="200" fill="#fff" stroke="#666" stroke-width="2"/>
  <text x="175" y="150" text-anchor="middle" font-size="14" fill="#666">Conference Room A</text>
  <!-- Open office -->
  <rect x="350" y="50" width="600" height="500" fill="#fff" stroke="#666" stroke-width="2"/>
  <text x="650" y="300" text-anchor="middle" font-size="14" fill="#666">Open Desk Area</text>
  <!-- Hallway -->
  <rect x="50" y="300" width="250" height="250" fill="#fafafa" stroke="#666" stroke-width="2"/>
  <text x="175" y="425" text-anchor="middle" font-size="14" fill="#666">Lobby</text>
</svg>